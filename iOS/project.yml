name: Watch Winder
options:
  bundleIdPrefix: com.shimondeitel.watchwinder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Watch Winder:
    type: application
    platform: iOS
    sources:
      - path: Watch Winder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.watchwinder
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Watch Winder/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Watch WinderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Watch WinderTests
      - path: Watch Winder.storekit
    dependencies:
      - target: Watch Winder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.watchwinder.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Watch WinderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Watch WinderUITests
    dependencies:
      - target: Watch Winder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.watchwinder.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Watch Winder:
    build:
      targets:
        Watch Winder: all
        Watch WinderTests: [test]
        Watch WinderUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Watch Winder.storekit
    test:
      config: Debug
      storeKitConfiguration: Watch Winder.storekit
      targets:
        - Watch WinderTests
        - Watch WinderUITests
    archive:
      config: Release
